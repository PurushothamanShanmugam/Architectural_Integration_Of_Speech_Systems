name: speech_understanding
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy
  - scipy
  - pandas
  - matplotlib
  - scikit-learn
  - ffmpeg
  - pysoundfile
  - libsndfile
  - pytest
  - pip:
      - torch==2.8.0
      - torchaudio==2.8.0
      - librosa
      - openai-whisper
      - jiwer
      - phonemizer
      - epitran
      - indic-transliteration
      - speechbrain
      - transformers==4.57.6
      - tokenizers>=0.22,<0.23
      - huggingface-hub>=0.34,<1.0
      - accelerate
      - coqui-tts
