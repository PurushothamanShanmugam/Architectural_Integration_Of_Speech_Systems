name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: powershell

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: speech_understanding
          environment-file: environment.yml
          auto-activate-base: false
          python-version: "3.10"

      - name: Show environment info
        run: |
          conda info
          python --version
          Write-Host "GITHUB_WORKSPACE = $env:GITHUB_WORKSPACE"
          Write-Host "PYTHONPATH = $env:PYTHONPATH"

      - name: Verify src import
        run: |
          python -c "import sys; print('\n'.join(sys.path))"
          python -c "import src; print('src import OK')"

      - name: Create required folders
        run: |
          New-Item -ItemType Directory -Force -Path data\raw | Out-Null
          New-Item -ItemType Directory -Force -Path data\processed | Out-Null
          New-Item -ItemType Directory -Force -Path outputs | Out-Null
          New-Item -ItemType Directory -Force -Path models | Out-Null

      - name: Run simple unit tests only
        run: |
          if (Test-Path tests) {
            python -m pytest -q `
              tests/test_ipa.py `
              tests/test_lid_features.py `
              tests/test_preprocessing.py `
              tests/test_summary.py `
              tests/test_translation.py
          } else {
            Write-Host "No tests folder found. Skipping pytest."
          }

      - name: List generated files
        run: |
          Write-Host "Outputs:"
          if (Test-Path outputs) {
            Get-ChildItem outputs -Recurse | Format-Table FullName
          }

          Write-Host "Models:"
          if (Test-Path models) {
            Get-ChildItem models -Recurse | Format-Table FullName
          }

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v4
        with:
          name: speech-understanding-intermediate
          path: |
            data/processed/**
            models/**
          if-no-files-found: warn
          retention-days: 7
